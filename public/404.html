<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Anurag — Portfolio</title>
    <script>
        // GitHub Pages SPA redirect hack:
        // When GitHub Pages gets a 404 for a deep link, it serves this 404.html.
        // This script redirects the URL back to index.html with the path encoded
        // as a query param, and the main app reads it back to restore the route.
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
            l.pathname.slice(1).split('?')[0].replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
